name: SignalK Plugin CI

# Cross-platform plugin test via SignalK's reusable workflow (Linux x64/arm64,
# macOS, Windows, armv7/Venus OS). Running it earns the registry's plugin-ci
# credit (worth +10 on the 0-100 score; its absence is a flat -10 penalty).
#
# Pinned to a signalk-server RELEASE COMMIT, not @master, for supply-chain
# safety and reproducibility. The signalk-registry skill flags when this pin
# falls behind the latest signalk-server release.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  plugin-ci:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@c86334b331c6e33b57ab1759407d01c15e94c583 # v2.29.0
